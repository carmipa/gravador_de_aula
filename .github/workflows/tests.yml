# CI/CD: testes, lint e cobertura para o Gravador de Aula - Teams FIAP
# Garante Build: Passing a cada push/PR. Cobertura mínima 85% (meta: 90%).

name: Tests & Lint

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Testes + Cobertura
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Rodar testes com cobertura
        run: |
          pytest tests/ -v --tb=short \
            --cov=config --cov=file_manager --cov=gravador --cov=logger_config --cov=main --cov=upload_gdrive \
            --cov-report=term-missing \
            --cov-fail-under=85

  lint:
    name: Lint (Ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Instalar Ruff
        run: pip install ruff

      - name: Rodar Ruff (lint)
        run: ruff check config.py file_manager.py gravador.py logger_config.py main.py upload_gdrive.py tests/
