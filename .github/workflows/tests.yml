# CI/CD: testes, lint e cobertura para o Gravador de Aula - Teams FIAP
# Linux + Windows (projeto é Windows-first com gdigrab/Teams desktop).

name: Tests & Lint

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test-linux:
    name: Testes Linux
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Rodar testes com cobertura
        run: |
          pytest tests/ -v --tb=short \
            --cov=config --cov=file_manager --cov=gravador \
            --cov=logger_config --cov=main --cov=upload_gdrive \
            --cov-report=term-missing \
            --cov-fail-under=85

  test-windows:
    name: Testes Windows
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Rodar testes
        run: |
          pytest tests/ -v --tb=short

  lint:
    name: Ruff
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Instalar Ruff
        run: pip install ruff

      - name: Rodar Ruff
        run: |
          ruff check config.py file_manager.py gravador.py logger_config.py main.py upload_gdrive.py tests/
